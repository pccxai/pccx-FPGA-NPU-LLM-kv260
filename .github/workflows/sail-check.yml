name: Sail typecheck

# Type-check the formal Sail ISA model on every PR / push that touches
# formal/sail/ or this workflow.  Sail is the same DSL that backs the
# RISC-V / Arm / CHERI specs — see formal/sail/README.md for context.

on:
  pull_request:
    paths:
      - 'formal/sail/**'
      - '.github/workflows/sail-check.yml'
  push:
    branches: [main]
    paths:
      - 'formal/sail/**'
      - '.github/workflows/sail-check.yml'

# Opt JavaScript actions into the Node.js 24 runtime ahead of the
# 2026-06-02 forced cutover. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 45    # cold opam build can take ~25 min; cache hits in ~3 min

    steps:
      - uses: actions/checkout@v4

      - name: Restore opam cache
        id: opam-cache
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-sail-0.20.1-ocaml-5.1.0-${{ runner.os }}-v1

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            opam zlib1g-dev libgmp-dev m4 pkg-config z3

      - name: Init opam (cold start only)
        run: |
          if [ ! -d "$HOME/.opam/default" ]; then
            opam init --bare --disable-sandboxing -y
            opam switch create default 5.1.0
          fi

      - name: Install Sail (cold start only)
        run: |
          eval $(opam env --switch=default)
          if ! command -v sail >/dev/null 2>&1; then
            opam install -y sail.0.20.1
          fi
          which sail && which z3

      - name: Sail typecheck (make check)
        working-directory: formal/sail
        run: |
          eval $(opam env --switch=default)
          make check
